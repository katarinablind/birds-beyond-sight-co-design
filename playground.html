<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jiu Jiu · Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#1a1a1a;
  /* one brand accent — accessible green (AA on white) */
  --green:#2f7d22;--green-light:#2f7d2214;--green-mid:#2f7d2238;--green-dim:#2f7d2299;
  --green-bright:#67AD5B;        /* visualizations only */
  --gray:#6C6C6C;--gray-light:#6C6C6C1c;
  /* cool, non-beige neutrals */
  --bg:#f6f7f8;--surface:#fff;--border:#e6e8ea;--text:#1a1a1a;
  --R:13px;
  --font:'Radio Canada Big',sans-serif;
  --font-sub:'Source Serif 4',Georgia,serif;
}
html{font-size:16px;height:100%}
body{background:var(--bg);font-family:var(--font);color:var(--text);
  -webkit-font-smoothing:antialiased;height:100vh;overflow:hidden}

/* ════ APP SHELL — Figma-studio layout ════ */
.app{display:flex;height:100vh;overflow:hidden}
.nav-rail{flex:0 0 172px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:12px 10px;gap:2px;z-index:40;min-height:0}
.nav-brand{display:flex;align-items:center;gap:9px;padding:4px 10px 14px;margin-bottom:6px;
  border-bottom:1px solid var(--border);flex-shrink:0}
.nav-brand-mark{width:28px;height:28px;border-radius:8px;background:var(--green);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-brand-mark svg{width:14px;height:14px;fill:#fff}
.nav-brand-text{font-size:.8rem;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1.2}
.nav-item{width:100%;min-height:36px;border:none;border-radius:8px;background:transparent;
  color:var(--gray);cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .12s;padding:8px 10px;font-family:var(--font);font-size:.68rem;font-weight:600;text-align:left}
.nav-item svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;opacity:.65}
.nav-item .nav-label{flex:1;min-width:0;line-height:1.2}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item:hover svg{opacity:.9}
.nav-item.active{background:var(--green-light);color:var(--green)}
.nav-item.active svg{opacity:1;stroke:var(--green)}
.nav-item .badge{font-size:.56rem;font-weight:700;background:var(--gray-light);color:var(--gray);
  border-radius:999px;padding:1px 7px;flex-shrink:0;line-height:1.4}
.nav-item.active .badge{background:var(--green-mid);color:var(--green)}
.nav-spacer{flex:1}
.workspace{flex:1;display:flex;min-width:0;min-height:0;background:var(--bg)}

/* lens panels */
.lens-panel{display:none;min-height:0}
.lens-panel.content-panel{flex:1;overflow-y:auto;padding:22px 28px 40px}
.lens-panel.content-panel.active{display:block}
.lens-panel.gallery-workspace{flex:1;min-height:0}
.lens-panel.gallery-workspace.active{display:flex}
.panel-desc{font-family:var(--font-sub);font-size:.74rem;color:var(--gray);
  line-height:1.5;margin-bottom:18px;max-width:640px}
.panel-desc b{color:var(--text);font-weight:600;font-family:var(--font)}

/* ════ GALLERY — proto sidebar + dark stage ════ */
.proto-sidebar{flex:0 0 292px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;min-height:0}
.proto-sidebar-head{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.ps-title{font-size:.82rem;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.cat-tabs{display:flex;flex-direction:column;gap:3px}
.cat-tab{padding:7px 10px;border-radius:8px;border:none;background:transparent;
  font-family:var(--font);font-size:.64rem;font-weight:600;color:var(--gray);cursor:pointer;
  transition:all .12s;display:flex;align-items:center;justify-content:space-between;text-align:left;width:100%}
.cat-tab:hover{background:var(--bg);color:var(--text)}
.cat-tab.active{background:var(--green-light);color:var(--green)}
.cat-tab .n{font-size:.56rem;opacity:.7;font-weight:700}
.idea-list{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;display:flex;flex-direction:column;gap:8px}
.idea-card{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;transition:border-color .15s,box-shadow .15s;overflow:hidden;flex-shrink:0}
.idea-card:hover{border-color:var(--green-dim)}
.idea-card.active{border-color:var(--green);box-shadow:0 2px 14px -4px var(--green-mid)}
.ic-summary{padding:12px 13px}
.ic-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ic-title{font-size:.8rem;font-weight:700;color:var(--black);line-height:1.25;flex:1;min-width:0}
.ic-sub{font-family:var(--font-sub);font-size:.62rem;color:var(--gray);margin-top:3px;line-height:1.4}
.ic-foot{display:flex;align-items:center;gap:7px;margin-top:8px;flex-wrap:wrap}
.ic-foot .pos-label{font-size:.54rem;color:var(--gray);font-weight:600;line-height:1.3}
.ic-expand{max-height:0;opacity:0;overflow:hidden;transition:max-height .3s ease,opacity .2s,padding .3s;
  padding:0 12px;background:var(--bg)}
.idea-card.expanded .ic-expand{max-height:480px;opacity:1;padding:0 12px 12px;border-top:1px solid var(--border)}
.ic-expand .meta-lens{font-family:var(--font-sub);font-size:.66rem;line-height:1.5;color:var(--text);
  background:var(--green-light);border-left:3px solid var(--green);border-radius:0 8px 8px 0;
  padding:9px 11px;margin-top:10px}
.ic-expand .meta-lens b{color:var(--green);font-weight:600;font-family:var(--font)}
.ic-expand .meta-sec{margin-top:10px}
.ic-expand .meta-lbl{font-size:.58rem;font-weight:700;color:var(--gray);margin-bottom:5px}
.ic-expand .meta-row{display:flex;flex-wrap:wrap;gap:4px}

/* gallery dark zone: stage + a11y panel */
.stage-area{flex:1;display:flex;min-width:0;min-height:0;background:#0a0a0a}
.stage{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.stage-toolbar{flex:0 0 auto;display:flex;align-items:center;padding:0 16px;height:40px;
  border-bottom:1px solid rgba(255,255,255,.07);background:#111}
.stage-title{font-size:.76rem;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:-.01em}
.stage-canvas{flex:1;display:flex;align-items:center;justify-content:center;
  min-height:0;position:relative;transition:background .4s ease;overflow:auto}
.stage-canvas[data-bg="studio"]{background:#0a0a0a}
.stage-canvas[data-bg="outdoor"]{
  background:linear-gradient(180deg,#5b8cba 0%,#7aab6e 38%,#3d6b35 72%,#2a4a24 100%)}
.stage-canvas[data-bg="outdoor"]::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% 100%,rgba(255,255,255,.08),transparent);pointer-events:none}
.phone-frame-wrap{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 28px 56px rgba(0,0,0,.55))}
.phone-scale{overflow:hidden;flex:0 0 auto;line-height:0;transition:width .25s,height .25s}
.phone-iframe{border:none;background:transparent;display:block;transform-origin:top left;
  transition:width .25s,height .25s}
.ext-card{border:2px dashed rgba(255,255,255,.2);border-radius:28px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;
  text-align:center;padding:34px;background:rgba(255,255,255,.04)}
.ext-card .ico-lg{color:var(--green-bright)}
.ext-card .ico-lg svg{width:38px;height:38px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ext-card .ext-title{font-size:.82rem;font-weight:700;color:#fff}

/* non-tech sketch board (photo of sketch + sticky note) */
.sketch-board{display:flex;gap:26px;align-items:center;justify-content:center;flex-wrap:wrap;padding:24px}
.sketch-photo{position:relative;width:290px;height:388px;background:#fff;border-radius:5px;
  box-shadow:0 22px 54px -14px rgba(0,0,0,.62);padding:10px 10px 34px;transform:rotate(-1.5deg)}
.sketch-photo img{width:100%;height:100%;object-fit:cover;border-radius:2px;display:block}
.sketch-photo .cap{position:absolute;left:0;right:0;bottom:9px;text-align:center;
  font-family:var(--font-sub);font-size:.62rem;color:#555}
.sketch-photo .sketch-drop{display:none}
.sketch-photo.missing img{display:none}
.sketch-photo.missing .cap{display:none}
.sketch-photo.missing .sketch-drop{width:100%;height:100%;border:2px dashed #cbd0d4;border-radius:2px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  color:#8a9098;text-align:center;padding:20px}
.sketch-drop svg{width:34px;height:34px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.sketch-drop span{font-size:.64rem;font-weight:500;font-family:var(--font-sub);line-height:1.5}
.sketch-drop span b{font-family:var(--font);font-weight:700}
.sticky{width:206px;min-height:206px;background:#fde68a;border-radius:2px;padding:15px 16px 18px;
  box-shadow:0 14px 34px -10px rgba(0,0,0,.5);transform:rotate(2deg);display:flex;flex-direction:column}
.sticky-lbl{font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a7d1e;margin-bottom:8px}
.sticky textarea{flex:1;border:none;background:transparent;resize:none;outline:none;
  font-family:var(--font-sub);font-size:.84rem;line-height:1.5;color:#4a3f12;width:100%}
.sticky textarea::placeholder{color:#b39a4a}
/* prototype search + hide a11y panel for non-tech entries */
.proto-search{width:100%;margin:8px 0 2px;padding:7px 11px;border:1px solid var(--border);
  border-radius:9px;background:var(--surface);font-family:var(--font);font-size:.7rem;color:var(--text);
  outline:none;transition:border-color .15s}
.proto-search:focus{border-color:var(--green)}
.proto-search::placeholder{color:var(--gray)}
.idea-empty{font-family:var(--font-sub);font-size:.72rem;color:var(--gray);padding:16px 4px}
.a11y-panel.hidden{display:none}

/* dark a11y side panel */
.a11y-panel{flex:0 0 196px;background:#111;border-left:1px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;min-height:0}
.a11y-panel-inner{height:100%;padding:10px;display:flex;flex-direction:column;gap:0;min-height:0}
.a11y-section{display:flex;flex-direction:column;gap:8px}
.a11y-section.preview{flex:0 0 auto;padding-bottom:14px;margin-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,.1)}
.a11y-section.access{flex:1;min-height:0;gap:10px}
.a11y-section-hdr{font-size:.76rem;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:-.01em}
.a11y-row{display:flex;align-items:center;gap:6px}
.a11y-lbl{font-size:.5rem;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.05em}
.a11y-lbl.inline{flex:0 0 30px}
.lv-toggle,.bg-toggle{display:flex;flex:1;background:rgba(255,255,255,.05);border-radius:999px;padding:2px;gap:2px;
  border:1px solid rgba(255,255,255,.07)}
.lv-btn,.bg-btn{flex:1;padding:5px 2px;border:none;border-radius:999px;background:transparent;
  font-family:var(--font);font-size:.54rem;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;transition:all .12s}
.lv-btn:hover,.bg-btn:hover{color:rgba(255,255,255,.75)}
.lv-btn.on,.bg-btn.on{background:var(--green);color:#fff}
.open-standalone{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;
  padding:10px 12px;border-radius:8px;border:none;background:rgba(255,255,255,.12);
  color:#fff;font-family:var(--font);font-size:.6rem;font-weight:600;cursor:pointer;transition:background .12s}
.open-standalone:hover{background:rgba(255,255,255,.18)}
/* VO zone — fills lower half of accessibility section */
.vo-zone{flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;
  padding-top:8px;border-top:1px solid rgba(255,255,255,.07)}
.vo-now{flex:0 0 auto;font-size:.58rem;line-height:1.42;color:rgba(255,255,255,.88);
  background:rgba(103,173,91,.08);border:1px solid rgba(103,173,91,.2);border-radius:10px;padding:7px 9px;min-height:42px}
.vo-controls{flex-shrink:0;display:flex;flex-direction:column;gap:6px;align-items:center}
.vo-toolbar{display:flex;align-items:center;justify-content:center;gap:12px}
.vo-pill{width:26px;height:26px;border-radius:999px;border:1.5px solid rgba(103,173,91,.4);
  background:rgba(103,173,91,.1);color:var(--green-bright);font-size:.48rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0}
.vo-pill:hover{border-color:var(--green);background:rgba(103,173,91,.22);color:#fff}
.vo-play{width:34px;height:34px;border-radius:50%;background:var(--green);border:none;cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .12s;padding:0}
.vo-play::after{content:'';width:0;height:0;border-left:10px solid #fff;border-top:6px solid transparent;
  border-bottom:6px solid transparent;margin-left:2px}
.vo-play.playing::after{border:none;width:9px;height:9px;margin-left:0;background:#fff;border-radius:1px}
.vo-play:hover{transform:scale(1.06)}
.vo-play:active{transform:scale(.95)}
.vo-tap{display:flex;align-items:center;justify-content:center;width:100%;
  padding:6px 10px;border-radius:999px;border:none;background:var(--green);color:#fff;
  font-family:var(--font);font-size:.54rem;font-weight:600;cursor:pointer;transition:all .12s}
.vo-tap:hover:not(:disabled){background:#5a9c4f}
.vo-tap:disabled{opacity:.28;cursor:not-allowed;background:rgba(255,255,255,.06);color:rgba(255,255,255,.3)}
.vo-meta{font-size:.48rem;color:rgba(255,255,255,.3);line-height:1.35;flex-shrink:0;text-align:center}
.vo-steps{flex:1;min-height:40px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;scrollbar-width:thin}
.vo-step{font-size:.52rem;line-height:1.32;padding:4px 6px;border-radius:6px;cursor:pointer;
  color:rgba(255,255,255,.38);border:1px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vo-step:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.vo-step.active{background:rgba(103,173,91,.15);border-color:rgba(103,173,91,.35);color:#b8ddb0}
.vo-step .vo-idx{opacity:.45;margin-right:3px;font-size:.46rem;font-weight:700}
.fid-meter{display:flex;gap:3px;margin-top:4px}
.fid-meter i{flex:1;height:4px;border-radius:2px;background:var(--border)}
.fid-meter i.on{background:var(--green)}
.pos-glyph{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:16px;height:16px;flex-shrink:0}
.pg-cell{border-radius:2px;background:var(--border)}
.pg-cell.on{background:var(--green)}
.chip{font-size:.5rem;font-weight:600;border-radius:999px;padding:2px 7px;line-height:1.5;white-space:nowrap;
  background:var(--gray-light);color:#555;border:1px solid var(--border)}
.chip.mot{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid)}
.chip.api{background:var(--green-light);color:var(--green);border:1px solid var(--green-mid);font-weight:700}
.fdot{display:inline-flex;align-items:center;gap:4px;font-size:.54rem;font-weight:700;color:var(--gray);flex-shrink:0}
.fdot i{width:8px;height:8px;border-radius:50%;display:inline-block}
.f1{background:#cdd2cf}.f2{background:#a7c19c}.f3{background:#7aa86a}
.f4{background:#4f9a3f}.f5{background:#2f7d22}

/* (stage + a11y panel styles above) */

/* ════ OVERVIEW LENS ════ */
#panel-overview.content-panel{flex-direction:column;padding:10px 16px 14px;overflow:hidden}
#panel-overview.content-panel.active{display:flex}
.viz-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px;margin-bottom:8px;flex-shrink:0}
.viz-modes{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.vizbtn{padding:6px 12px;border-radius:999px;border:1.5px solid var(--border);
  background:var(--surface);font-family:var(--font);font-size:.64rem;font-weight:600;
  color:var(--gray);cursor:pointer;transition:all .15s}
.vizbtn:hover{border-color:var(--green-dim);color:var(--text)}
.vizbtn.on{background:var(--green);color:#fff;border-color:var(--green)}
.mot-filter{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-left:auto}
.mot-filter .lbl{font-size:.58rem;font-weight:700;color:var(--gray);margin-right:2px}
.motbtn{padding:5px 11px;border-radius:999px;border:1.5px solid var(--border);
  background:var(--surface);font-family:var(--font);font-size:.6rem;font-weight:600;
  color:var(--gray);cursor:pointer;transition:all .15s}
.viz-stage{position:relative;flex:1;min-height:0;background:var(--surface);
  border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.viz-stage canvas{display:block;width:100%;height:100%;cursor:pointer}
.viz-tip{position:absolute;pointer-events:none;opacity:0;transition:opacity .1s;
  background:var(--text);color:#fff;border-radius:8px;padding:6px 9px;
  font-size:.62rem;font-weight:600;line-height:1.3;max-width:180px;z-index:5}
.viz-tip.on{opacity:1}

/* ════ FIDELITY LENS ════ */
.fid-board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start}
.fid-col{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;
  padding:11px;min-height:120px}
.fid-colhead{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.fid-colhead .n{font-size:.74rem;font-weight:700;color:var(--black)}
.fid-coldesc{font-family:var(--font-sub);font-size:.56rem;color:var(--gray);
  line-height:1.4;margin-bottom:10px;min-height:30px}
.fid-card{background:var(--bg);border:1px solid var(--border);border-radius:9px;
  padding:8px 9px;margin-bottom:7px;cursor:pointer;transition:all .12s}
.fid-card:hover{border-color:var(--green-dim);transform:translateY(-1px)}
.fid-card .t{font-size:.66rem;font-weight:700;color:var(--black);line-height:1.2}
.fid-card .s{font-family:var(--font-sub);font-size:.54rem;color:var(--gray);margin-top:2px;line-height:1.3}

/* ════ SKILLS LENS ════ */
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:13px}
.skill-card{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;
  padding:14px;display:flex;flex-direction:column}
.skill-card:hover{border-color:#6b4fb066}
.sk-name{font-size:.74rem;font-weight:700;color:var(--black);font-family:'JetBrains Mono',var(--font);
  display:flex;align-items:center;gap:7px}
.sk-name .gem{width:7px;height:7px;border-radius:2px;background:#6b4fb0;transform:rotate(45deg)}
.sk-when{font-family:var(--font-sub);font-size:.66rem;color:var(--gray);line-height:1.45;
  margin:8px 0 11px;flex:1}
.sk-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sk-used{font-size:.54rem;color:var(--green);font-weight:600}
.copybtn{padding:5px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);
  font-family:var(--font);font-size:.58rem;font-weight:600;color:var(--gray);cursor:pointer;transition:all .15s}
.copybtn:hover{border-color:#6b4fb0;color:#6b4fb0}
.copybtn.done{background:var(--green);color:#fff;border-color:var(--green)}

/* ════ TOKENS LENS ════ */
.tok-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;align-items:start}
.tok-block{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:16px}
.tok-h{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gray);margin-bottom:12px}
.sw-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sw{width:34px;height:34px;border-radius:8px;border:1px solid rgba(0,0,0,.08);flex-shrink:0}
.sw-info .n{font-size:.66rem;font-weight:600}
.sw-info .v{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--gray)}
.type-ramp>div{margin-bottom:10px;line-height:1.1}
.tr-lbl{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--gray);display:block;margin-top:2px}
.comp-demo{display:flex;flex-wrap:wrap;gap:8px;align-items:center}

function makeSketch(o){return Object.assign({},SKETCH_DEFAULTS,o);}
// Sketch photos live in the repo (e.g. sketches/foo.jpg) — set `img` on the entry.
// Only the sticky-note text is editable + saved locally; the photo comes from the folder.
let sketchData=JSON.parse(localStorage.getItem('jj-sketchdata')||'{}');    // {id:{note}}
REG.filter(r=>r.kind==='sketch').forEach(r=>{const d=sketchData[r.id];
  if(d&&d.note!=null)r.note=d.note;});

function onStickyInput(id,ta){
  const r=REG.find(x=>x.id===id);if(r)r.note=ta.value;
  (sketchData[id]=sketchData[id]||{}).note=ta.value;
  localStorage.setItem('jj-sketchdata',JSON.stringify(sketchData));
}
function renderSketchBoard(r,slot){
  iframeEl=null;
  const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const photo=`<div class="sketch-photo${r.img?'':' missing'}">
      ${r.img?`<img src="${r.img}" alt="Sketch of ${esc(r.t)}" onerror="this.closest('.sketch-photo').classList.add('missing')">`:''}
      <div class="sketch-drop"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>Add a photo to the <b>sketches/</b> folder, then set <b>img</b> on this entry</span></div>
      <div class="cap">${esc(r.t)}</div></div>`;
  slot.innerHTML=`<div class="sketch-board">${photo}
    <div class="sticky"><div class="sticky-lbl">Note</div>
      <textarea placeholder="Write a note…" oninput="onStickyInput('${r.id}',this)">${esc(r.note)}</textarea></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  WCAG CONTRAST ENGINE — real ratios, computed live (no fabrication)
// ═══════════════════════════════════════════════════════════════
function _lum(hex){
  hex=hex.replace('#','');
  const v=[0,2,4].map(i=>parseInt(hex.substr(i,2),16)/255)
    .map(c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4));
  return 0.2126*v[0]+0.7152*v[1]+0.0722*v[2];
}
function contrast(a,b){
  const L1=_lum(a),L2=_lum(b),hi=Math.max(L1,L2),lo=Math.min(L1,L2);
  return (hi+0.05)/(lo+0.05);
}
function rateContrast(r){
  if(r>=4.5)return{cls:'b-pass',label:'AA ✓'};
  if(r>=3)return{cls:'b-large',label:'Large only'};
  return{cls:'b-fail',label:'Fails'};
}

function getVoSteps(r){
  if(!r)return[];
  let steps;
  if(r.embed&&VO_SCRIPTS[r.proto])steps=VO_SCRIPTS[r.proto];
  else if(VO_SCRIPTS[r.id])steps=VO_SCRIPTS[r.id];
  else steps=[
    {say:`${r.t}. ${r.sci}`},
    {say:'Full VoiceOver annotation in progress for this screen.'},
  ];
  return steps;
}

function voApplyFocus(step){
  if(!iframeEl||!iframeEl._ready||!step?.sel)return;
  iframeEl.contentWindow.postMessage({type:'voFocus',sel:step.sel},'*');
}

function voClearFocus(){
  if(iframeEl&&iframeEl._ready)iframeEl.contentWindow.postMessage({type:'voFocus',sel:null},'*');
}

function updateVoUI(full){
  const panel=document.getElementById('a11yPanel');
  if(!current||!panel)return;
  if(full||!panel.querySelector('.a11y-panel-inner')){
    renderA11yPanel(current);
    return;
  }
  const steps=getVoSteps(current);
  const step=steps[voState.idx];
  const playBtn=document.getElementById('voPlayBtn');
  if(playBtn)playBtn.classList.toggle('playing',voState.playing);
  const now=document.getElementById('voNow');
  if(now)now.textContent=step?.say||'—';
  const meta=document.getElementById('voMeta');
  if(meta){
    const hint=step?.tap?' · tap to activate':'';
    meta.textContent=step?`Step ${voState.idx+1} of ${steps.length}${hint}`:'';
  }
  const actBtn=document.getElementById('voActBtn');
  if(actBtn)actBtn.disabled=!step?.tap;
  // Only highlight / focus once the screen reader has actually been started —
  // no green before the user presses play.
  panel.querySelectorAll('.vo-step').forEach((el,i)=>el.classList.toggle('active',voState.started&&i===voState.idx));
  if(voState.started)voApplyFocus(step);
  else voClearFocus();
}

function applyPhoneDimensions(){
  // Frame size is FIXED regardless of low-vision level — the content inside the
  // iframe scales via the lvScale message, so we see reflow inside a constant frame.
  const iw=IFRAME_BASE_W,ih=IFRAME_BASE_H;
  const cw=Math.round(iw*IFRAME_ZOOM),ch=Math.round(ih*IFRAME_ZOOM);
  const scaleEl=document.querySelector('.phone-scale');
  if(scaleEl){scaleEl.style.width=cw+'px';scaleEl.style.height=ch+'px';}
  if(iframeEl){
    iframeEl.style.width=iw+'px';
    iframeEl.style.height=ih+'px';
    iframeEl.style.transform=`scale(${IFRAME_ZOOM})`;
  }
  const ext=document.querySelector('.ext-card');
  if(ext){ext.style.width=cw+'px';ext.style.height=ch+'px';}
}

function openStandalone(){
  if(!current)return;
  const url=current.embed?`prototypes.html?embed=1&proto=${current.proto}`:current.src;
  window.open(url,'_blank','noopener');
}

function voSpeakStep(i){
  const steps=getVoSteps(current);
  if(!steps.length)return;
  voState.started=true;
  voState.idx=Math.max(0,Math.min(i,steps.length-1));
  const step=steps[voState.idx];
  voApplyFocus(step);
  const myGen=++voGen; // any earlier utterance's callbacks are now stale
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(step.say);
  u.rate=0.92;
  u.onend=()=>{
    if(myGen!==voGen)return;               // paused / superseded — do nothing
    if(voState.playing&&voState.idx<steps.length-1){
      voState.idx++;
      voSpeakStep(voState.idx);
    }else{
      voState.playing=false;
      updateVoUI();
    }
  };
  u.onerror=()=>{if(myGen!==voGen)return;voState.playing=false;updateVoUI();};
  window.speechSynthesis.speak(u);
  updateVoUI();
}

function voActivate(){
  const steps=getVoSteps(current);
  const step=steps[voState.idx];
  if(!step?.tap||!step.sel)return;
  voPause();
  if(iframeEl&&iframeEl._ready){
    iframeEl.contentWindow.postMessage({type:'voActivate',sel:step.sel},'*');
  }
  const u=new SpeechSynthesisUtterance(step.after||'Activated.');
  u.rate=0.92;
  window.speechSynthesis.speak(u);
}

function voToggle(){
  if(voState.playing){voPause();return;}
  if(!current)return;
  voState.playing=true;
  voSpeakStep(voState.idx);
}

function voPause(){
  voGen++;                       // invalidate any in-flight utterance callback
  voState.playing=false;
  window.speechSynthesis.cancel();
  window.speechSynthesis.cancel(); // some engines need a second nudge
  updateVoUI();
}

function voNext(){
  const steps=getVoSteps(current);
  if(!steps.length||voState.idx>=steps.length-1)return;
  voState.started=true;
  voState.idx++;
  if(voState.playing)voSpeakStep(voState.idx);
  else updateVoUI();
}

function voPrev(){
  if(voState.idx<=0)return;
  voState.started=true;
  voState.idx--;
  if(voState.playing)voSpeakStep(voState.idx);
  else updateVoUI();
}

function voJump(i){
  voState.started=true;
  voState.idx=i;
  if(voState.playing)voSpeakStep(i);
  else updateVoUI();
}

function a11yFlags(r){
  const f=[];
  f.push({c:'a11y-ok',t:'Audio-first ✓'});                       // whole product is audio-first
  if(r.fid>=4)f.push({c:'a11y-warn',t:'Live audio — needs SR state labels'});
  const colorCoded=['minimap-radar-overlay'].some(s=>r.skills.includes(s))||r.id===13;
  if(colorCoded)f.push({c:'a11y-warn',t:'Color-coded — add text labels'});

// ═══════════════════════════════════════════════════════════════
//  OVERVIEW — five lenses
// ═══════════════════════════════════════════════════════════════
const AUD_IDS=['self','friend','group','community','public'];
const VIZ_MODES=[
  {id:'sharing',label:'Sharing'},
  {id:'audio',label:'Audio'},
  {id:'learning',label:'Learning'},
  {id:'timeline',label:'Timeline'},
  {id:'mindful',label:'Mindfulness'},
];
let motFilterOn=null,vizMode='sharing';
const vizCanvas=document.getElementById('vizCanvas');
const vizCtx=vizCanvas.getContext('2d');
const vizStage=document.getElementById('vizStage');
const vizTip=document.getElementById('vizTip');
const MARK_R=7;

function audNorm(aud){return AUD_IDS.indexOf(aud)/Math.max(AUD_IDS.length-1,1);}
function liveReflectNorm(time){return['colocated','remote'].includes(time)?0:1;}
function motColor(r){return MOT_COLORS[r.mot[0]]||'#2f7d22';}
function filteredReg(){return REG.filter(r=>!motFilterOn||r.mot.includes(motFilterOn));}
function regIndex(r){return REG.findIndex(x=>x.id===r.id)+1;}
function learnAmount(r){return Math.min(1,(r.learnActive+r.learnPassive)/10);}
function learnActiveShare(r){return r.learnActive/(r.learnActive+r.learnPassive+0.01);}
function audioDrivenScore(r){return(norm5(r.audioFirst)+norm5(r.audioCentrality))/2;}

function plotRect(w,h,mode){
  if(mode==='mindful')return{left:0,right:0,top:0,bottom:0};
  if(mode==='sharing')return{left:48,right:48,top:36,bottom:40};
  if(mode==='learning')return{left:56,right:56,top:36,bottom:40};
  return{left:48,right:48,top:36,bottom:40};
}
function innerBox(w,h,pr){
  return{x0:pr.left,y0:pr.top,x1:w-pr.right,y1:h-pr.bottom,
    iw:w-pr.left-pr.right,ih:h-pr.top-pr.bottom};
}

function rawPos(r,mode,w,h){
  const pr=plotRect(w,h,mode),b=innerBox(w,h,pr);
  if(mode==='sharing')return{x:b.x0+audNorm(r.aud)*b.iw,y:b.y0+liveReflectNorm(r.time)*b.ih};
  if(mode==='audio'){
    const score=audioDrivenScore(r);
    return{x:b.x0+(1-score)*b.iw,y:b.y0+b.ih/2};
  }
  if(mode==='learning'){
    return{x:b.x0+learnActiveShare(r)*b.iw,y:b.y0+(1-learnAmount(r))*b.ih};
  }
  if(mode==='timeline'){
    return{x:b.x0+postWhenNorm(r.postWhen)*b.iw,y:b.y0+b.ih/2};
  }
  if(mode==='mindful'){
    const cx=w/2,cy=h/2,maxR=Math.min(w,h)*0.46;
    const ang=stableHash(r.id)*0.013;
    const dist=(1-norm5(r.mindfulness))*maxR;
    return{x:cx+Math.cos(ang)*dist,y:cy+Math.sin(ang)*dist};
  }
  return{x:w/2,y:h/2};
}

function spreadKey(r,mode,w,h){
  const p=rawPos(r,mode,w,h);
  if(mode==='audio'||mode==='timeline'){
    const b=innerBox(w,h,plotRect(w,h,mode));
    return`${mode}|${Math.round((p.x-b.x0)/b.iw*28)}`;
  }
  const pr=plotRect(w,h,mode);
  return`${mode}|${Math.round((p.x-pr.left)/14)}|${Math.round((p.y-pr.top)/14)}`;
}

function buildSpreadMap(items,w,h){
  const mode=vizMode;
  const groups={};
  items.forEach(r=>{(groups[spreadKey(r,mode,w,h)]=groups[spreadKey(r,mode,w,h)]||[]).push(r);});
  const pos=new Map();
  Object.values(groups).forEach(group=>{
    group.sort((a,b)=>String(a.id).localeCompare(String(b.id),undefined,{numeric:true}));
    const base=rawPos(group[0],mode,w,h);
    if(group.length===1){pos.set(group[0],base);return;}
    const ring=Math.min(mode==='audio'||mode==='timeline'?50:32,10+group.length*4);
    group.forEach((r,i)=>{
      const ang=(i/group.length)*Math.PI*2-Math.PI/2;
      pos.set(r,{x:base.x+Math.cos(ang)*ring,y:base.y+Math.sin(ang)*ring});
    });
  });
  return pos;
}

let vizPlotMap=new Map(),vizItemKey='';
function syncVizLayout(items,w,h){
  const key=`${vizMode}|${items.map(r=>r.id).join('|')}`;
  if(key===vizItemKey&&vizPlotMap.size)return;
  vizItemKey=key;
  vizPlotMap=buildSpreadMap(items,w,h);
}
function plotXY(r){return vizPlotMap.get(r)||{x:0,y:0};}

function resizeViz(){
  const rect=vizStage.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  vizCanvas.width=Math.round(rect.width*dpr);
  vizCanvas.height=Math.round(rect.height*dpr);
  vizCtx.setTransform(dpr,0,0,dpr,0,0);
}

function hitTest(mx,my,items){
  for(let i=items.length-1;i>=0;i--){
    const r=items[i],p=plotXY(r);
    if((mx-p.x)**2+(my-p.y)**2<=(MARK_R+4)**2)return r;
  }
  return null;
}

function showVizTip(r,x,y){
  if(!r){vizTip.classList.remove('on');return;}
  vizTip.textContent=r.t;
  vizTip.classList.add('on');
  const sr=vizStage.getBoundingClientRect();
  let left=x+10,top=y-10;
  if(left+160>sr.width)left=x-170;
  vizTip.style.left=Math.max(6,left)+'px';
  vizTip.style.top=Math.max(6,top)+'px';
}

function lblStyle(){
  vizCtx.fillStyle='#1a1a1a';
  vizCtx.font='600 11px Radio Canada Big,sans-serif';
}

function drawCrosshair(b){
  vizCtx.strokeStyle='rgba(26,26,26,.09)';vizCtx.lineWidth=1;
  vizCtx.beginPath();
  vizCtx.moveTo(b.x0+b.iw/2,b.y0);vizCtx.lineTo(b.x0+b.iw/2,b.y1);
  vizCtx.moveTo(b.x0,b.y0+b.ih/2);vizCtx.lineTo(b.x1,b.y0+b.ih/2);
  vizCtx.stroke();
}

function drawSharingAxes(w,h){
  const pr=plotRect(w,h,'sharing'),b=innerBox(w,h,pr);
  drawCrosshair(b);
  lblStyle();
  vizCtx.textBaseline='middle';
  vizCtx.textAlign='center';vizCtx.fillText('Live',b.x0+b.iw/2,b.y0-14);
  vizCtx.fillText('Reflective',b.x0+b.iw/2,b.y1+16);
  vizCtx.textAlign='left';vizCtx.fillText('Self',b.x0,b.y0+b.ih/2);
  vizCtx.textAlign='right';vizCtx.fillText('Public',b.x1,b.y0+b.ih/2);
}

function drawLinearAxis(w,h,mode,leftLbl,rightLbl){
  const pr=plotRect(w,h,mode),b=innerBox(w,h,pr);
  const y=b.y0+b.ih/2;
  vizCtx.strokeStyle='rgba(26,26,26,.14)';vizCtx.lineWidth=1.5;
  vizCtx.beginPath();vizCtx.moveTo(b.x0,y);vizCtx.lineTo(b.x1,y);vizCtx.stroke();
  lblStyle();vizCtx.textBaseline='top';
  vizCtx.textAlign='left';vizCtx.fillText(leftLbl,b.x0,y+10);
  vizCtx.textAlign='right';vizCtx.fillText(rightLbl,b.x1,y+10);
}

function drawAudioAxis(w,h){
  drawLinearAxis(w,h,'audio','Audio-driven','Background / afterthought');
}

function drawTimelineAxis(w,h){
  drawLinearAxis(w,h,'timeline','Right after birding','All time');
}

function drawLearningAxes(w,h){
  const pr=plotRect(w,h,'learning'),b=innerBox(w,h,pr);
  drawCrosshair(b);
  lblStyle();vizCtx.textBaseline='middle';
  vizCtx.textAlign='center';vizCtx.fillText('More learning',b.x0+b.iw/2,b.y0-14);
  vizCtx.fillText('Less learning',b.x0+b.iw/2,b.y1+16);
  vizCtx.textAlign='left';vizCtx.fillText('Passive',b.x0,b.y0+b.ih/2);
  vizCtx.textAlign='right';vizCtx.fillText('Active',b.x1,b.y0+b.ih/2);
}

function drawMindfulField(w,h){
  const cx=w/2,cy=h/2,maxR=Math.hypot(w,h)*0.58;
  const g=vizCtx.createRadialGradient(cx,cy,0,cx,cy,maxR);
  g.addColorStop(0,'rgba(47,125,34,0.38)');
  g.addColorStop(0.22,'rgba(67,130,55,0.22)');
  g.addColorStop(0.48,'rgba(103,173,91,0.1)');
  g.addColorStop(0.72,'rgba(250,252,251,0.85)');
  g.addColorStop(1,'#fafcfb');
  vizCtx.fillStyle=g;
  vizCtx.fillRect(0,0,w,h);
  lblStyle();vizCtx.globalAlpha=0.55;vizCtx.textBaseline='middle';
  vizCtx.textAlign='left';vizCtx.fillText('Less mindful',18,h-22);
  vizCtx.textAlign='right';vizCtx.fillText('Less mindful',w-18,h-22);
  vizCtx.textAlign='center';vizCtx.globalAlpha=0.45;
  vizCtx.fillText('More mindful',cx,cy);
  vizCtx.globalAlpha=1;
}

function drawItem(r,p){
  vizCtx.beginPath();vizCtx.arc(p.x,p.y,MARK_R,0,Math.PI*2);
  vizCtx.fillStyle=motColor(r);vizCtx.fill();
  vizCtx.fillStyle='#fff';
  vizCtx.font='600 7px Radio Canada Big,sans-serif';
  vizCtx.textAlign='center';vizCtx.textBaseline='middle';
  vizCtx.fillText(String(regIndex(r)),p.x,p.y+0.5);
}

function drawItems(items){items.forEach(r=>drawItem(r,plotXY(r)));}

function renderOverview(){
  const w=vizStage.clientWidth,h=vizStage.clientHeight;
  const items=filteredReg();
  syncVizLayout(items,w,h);
  if(vizMode==='mindful')drawMindfulField(w,h);
  else{
    vizCtx.fillStyle='#fafcfb';vizCtx.fillRect(0,0,w,h);
    if(vizMode==='sharing')drawSharingAxes(w,h);
    else if(vizMode==='audio')drawAudioAxis(w,h);
    else if(vizMode==='learning')drawLearningAxes(w,h);
    else if(vizMode==='timeline')drawTimelineAxis(w,h);
  }
  drawItems(items);
}

motFilterEl.innerHTML='<span class="lbl">Motivation</span>';
Object.entries(MOTIVATIONS).forEach(([k,v])=>{

vizCanvas.addEventListener('mousemove',e=>{

vizCanvas.addEventListener('click',e=>{

function renderA11y(){
  // 1 — live contrast audit
  const rows=CONTRAST_PAIRS.map(p=>{
    const r=contrast(p.fg,p.bg),rate=rateContrast(r);
    return `<div class="ca-row">
      <div class="ca-swatch" style="background:${p.bg};color:${p.fg}">Aa</div>
      <div class="ca-info"><div class="ca-name">${p.name}</div><div class="ca-use">${p.use}</div></div>
      <div class="ca-ratio">${r.toFixed(2)}:1</div>
      <span class="ca-badge ${rate.cls}">${rate.label}</span></div>`;
  }).join('');
  document.getElementById('contrastBlock').innerHTML=`
    <div class="bh">Live contrast audit</div>
    ${rows}
    <div class="a11y-fix"><b>Real finding:</b> the brand green at <code>#67AD5B</code> only reaches <b>2.73:1</b> — it fails AA as both text and as a white-on-green button. Introduce <code>--green-text:#2f7d22</code> (<b>5.15:1</b>) for any text-bearing or interactive element; keep bright green for large decorative fills only.</div>`;

  // 2 — quick reference
  document.getElementById('quickRefBlock').innerHTML=`
    <div class="bh">Quick reference</div>
    <div class="qr-grid">
      <div class="qr-card"><div class="h">Targets</div><div class="l"><b>48×48pt</b> floor · 56pt+ for Play/Identify · ≥8pt apart</div></div>
      <div class="qr-card"><div class="h">Audio-first</div><div class="l"><b>No autoplay.</b> Every listening / result state needs a <b>text equivalent</b>.</div></div>
      <div class="qr-card"><div class="h">Labels</div><div class="l">Icon buttons get real labels ("Start Sound ID", not "mic"). Unique per screen.</div></div>
      <div class="qr-card"><div class="h">No color-only</div><div class="l">Pair color with text/icon. Don't rely on red↔green (8% can't tell).</div></div>
      <div class="qr-card"><div class="h">Reflow</div><div class="l">Holds at <b>200%</b> text & <b>400%</b> zoom; test at 320px.</div></div>
      <div class="qr-card"><div class="h">Motion</div><div class="l">Respect <b>Reduce Motion</b>; cross-fade, not slide. Pausable.</div></div>
      <div class="qr-card"><div class="h">SR swipes</div><div class="l">If sighted = 3 taps, blind ≤ <b>5 swipes</b>. Count them.</div></div>
      <div class="qr-card"><div class="h">Test it</div><div class="l">VoiceOver on, <b>screen off</b>, complete the task by ear before sharing.</div></div>
    </div>`;

  // 3 — interactive pre-share checklist (persisted)
  renderChecklist();
}
function ckKey(g,i){return 'jj-a11y-'+g+'-'+i;}
function renderChecklist(){
  const total=CHECKLIST.reduce((n,g)=>n+g.items.length,0);
  let done=0;
  const groups=CHECKLIST.map(grp=>{
    const items=grp.items.map((it,i)=>{
      const on=localStorage.getItem(ckKey(grp.g,i))==='1';if(on)done++;
      return `<div class="chk-item${on?' done':''}" onclick="toggleChk('${grp.g}',${i},this)">
        <div class="chk-box"></div><div class="chk-label">${it}</div></div>`;
    }).join('');
    return `<div class="chk-group"><div class="chk-gh">${grp.g}
      <span class="cnt">${grp.items.length}</span></div>${items}</div>`;
  }).join('');
  document.getElementById('checklistBlock').innerHTML=`
    <div class="bh">Pre-share checklist
      <span id="ckPct" style="font-weight:700;color:#2f7d22">${Math.round(done/total*100)}%</span></div>
    <div class="chk-progress"><i id="ckBar" style="width:${done/total*100}%"></i></div>
    ${groups}`;
}
function toggleChk(g,i,el){
  const k=ckKey(g,i),on=localStorage.getItem(k)==='1';
  localStorage.setItem(k,on?'0':'1');
  el.classList.toggle('done',!on);
  const total=CHECKLIST.reduce((n,gr)=>n+gr.items.length,0);
  let done=0;CHECKLIST.forEach(gr=>gr.items.forEach((_,j)=>{if(localStorage.getItem(ckKey(gr.g,j))==='1')done++;}));
  document.getElementById('ckBar').style.width=(done/total*100)+'%';
  document.getElementById('ckPct').textContent=Math.round(done/total*100)+'%';
}
